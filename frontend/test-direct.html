<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        button { padding: 10px 20px; background: #0066cc; color: white; border: none; cursor: pointer; }
        #results { margin-top: 20px; white-space: pre-wrap; background: #f5f5f5; padding: 15px; border-radius: 5px; }
        .property { margin: 10px 0; padding: 10px; border-left: 4px solid #0066cc; background: white; }
        .critical { border-left-color: #dc2626; }
        .high { border-left-color: #ea580c; }
        .medium { border-left-color: #ca8a04; }
    </style>
</head>
<body>
    <h1>CloudFormation Security Analyzer - Direct API Test</h1>
    <p>This bypasses CloudFront to test the API directly</p>
    
    <button onclick="testAPI()">Test S3 Bucket Analysis</button>
    <div id="status"></div>
    <div id="results"></div>

    <script>
        async function testAPI() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            statusDiv.innerHTML = '⏳ Calling API...';
            resultsDiv.innerHTML = '';
            
            try {
                const response = await fetch('https://6uyvwqy865.execute-api.us-east-1.amazonaws.com/dev/analysis/quick', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        resourceUrl: 'https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-resource-s3-bucket.html',
                        analysisType: 'quick'
                    })
                });
                
                const data = await response.json();
                
                statusDiv.innerHTML = `✅ Status: ${data.status}`;
                
                if (data.results && data.results.result) {
                    // Parse the JSON from the result text
                    const jsonMatch = data.results.result.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const parsed = JSON.parse(jsonMatch[0]);
                        
                        resultsDiv.innerHTML = `<h2>Found ${parsed.properties.length} Security Properties</h2>`;
                        
                        parsed.properties.forEach(prop => {
                            const div = document.createElement('div');
                            div.className = `property ${prop.riskLevel.toLowerCase()}`;
                            div.innerHTML = `
                                <h3>${prop.name} - ${prop.riskLevel}</h3>
                                <p><strong>Impact:</strong> ${prop.securityImplication}</p>
                                <p><strong>Recommendation:</strong> ${prop.recommendation}</p>
                            `;
                            resultsDiv.appendChild(div);
                        });
                    }
                }
                
            } catch (error) {
                statusDiv.innerHTML = `❌ Error: ${error.message}`;
                resultsDiv.innerHTML = error.stack;
            }
        }
    </script>
</body>
</html>
