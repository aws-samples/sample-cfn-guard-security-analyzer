name: cfn-security-analyzer
description: Quick security scanner for CloudFormation resources
runtime: python3.11
entrypoint: security_analyzer_agent:handler
model: anthropic.claude-3-5-sonnet-20241022-v2:0

# Environment configuration
environment:
  dev:
    memory_size: 512
    timeout: 30
  prod:
    memory_size: 512
    timeout: 30

# Dependencies
dependencies:
  - strands-agents>=0.2.0
  - strands-agents-tools>=0.2.10
