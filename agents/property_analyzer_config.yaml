name: cfn-property-analyzer
description: Detailed property analyzer for CloudFormation resources
runtime: python3.11
entrypoint: property_analyzer_agent:invoke
model: us.anthropic.claude-3-5-sonnet-20241022-v2:0

# Environment configuration
environment:
  dev:
    memory_size: 512
    timeout: 60
  prod:
    memory_size: 512
    timeout: 60

# Dependencies
dependencies:
  - strands-agents>=0.2.0
  - strands-agents-tools>=0.2.10
